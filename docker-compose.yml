# RoadSoS Local Development Stack
# Usage: docker compose up --build
# Access: http://localhost:8000/docs

services:
  # ── Postgres + PostGIS + pgvector ──────────────────────────────────
  db:
    image: ankane/pgvector:v0.7.4-pg16
    environment:
      POSTGRES_USER: roadsos
      POSTGRES_PASSWORD: roadsos_dev
      POSTGRES_DB: roadsos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadsos"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis (cache + event bus + rate limiting) ──────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── RoadSoS API ────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://roadsos:roadsos_dev@db:5432/roadsos
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev_secret_key_replace_in_production_with_48_char_minimum
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:8080"]'
      UVICORN_WORKERS: "1"
      ESCALATION_DEMO_MODE: "true"
      TASK_QUEUE_BACKEND: database
      RAG_EMBEDDING_PROVIDER: hashing
      RAG_LLM_ENABLED: "false"
      SMS_FALLBACK_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
